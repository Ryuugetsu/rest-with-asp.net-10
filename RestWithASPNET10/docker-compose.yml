services:
  rest-with-asp-net-10:
    image: ryuugetsu/rest-with-asp-net-10:latest
    build:
      context: .
      dockerfile: RestWithASPNET10/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=host.docker.internal,1433;Database=ASP_NET_10;User Id=sa;Password=Senha123!;TrustServerCertificate=True;Encrypt=False
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro
    networks:
      - ryuugestsu-network
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - ryuugestsu-network
networks:
  ryuugestsu-network:
    driver: bridge
volumes:
  portainer_data: